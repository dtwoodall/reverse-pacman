<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reverse Pac-Man</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>
  <div id="ui-container" style="display: none;">
    <h1>REVERSE PAC-MAN</h1>
    <div id="game-status">Waiting for players...</div>
    <div id="score-board"></div>
  </div>
  <div id="name-container">
    <h2>ENTER NAME</h2>
    <input type="text" id="name-input" maxlength="10" placeholder="e.g. BLINKY" autofocus>
    <button id="join-btn">JOIN GAME</button>
  </div>
  <div id="lobby-container" style="display: none;">
    <h2>LOBBY</h2>
    <div id="lobby-players"></div>

    <div id="class-selection" style="margin-bottom: 20px;">
      <h3 style="color: #fff; margin-top: 0;">SELECT CLASS</h3>
      <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 10px; flex-wrap: wrap;">
        <button class="class-btn selected" data-class="blinky" style="--c: #FF0000;">PHANTOM</button>
        <button class="class-btn" data-class="pinky" style="--c: #FFB8FF;">TRAPPER</button>
        <button class="class-btn" data-class="inky" style="--c: #00FFFF;">SABOTEUR</button>
        <button class="class-btn" data-class="clyde" style="--c: #FFB852;">VAMPIRE</button>
      </div>
      <div id="class-desc" style="font-size: 11px; color: #ccc; max-width: 400px; margin: 0 auto; line-height: 1.4;">
        Phantom (Blinky): Standard stats.<br>Active: Ghost Mode - Invisible & intangible for 20 energy.
      </div>
    </div>

    <button id="ready-btn">READY UP</button>
  </div>
  <div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/game.js"></script>
</body>

</html>
